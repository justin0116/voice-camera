<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="语音相机">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>语音相机</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --safe-area-top: env(safe-area-inset-top, 0px);
    --safe-area-bottom: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100dvh;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    position: fixed;
  }
  .app {
    width: 100%; height: 100dvh;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  /* 相机预览 */
  .viewfinder {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: #0a0a0a;
  }
  /* 防抖变换容器 */
  .stabilizer {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }
  .stabilizer video {
    position: absolute;
    /* 放大 5% 留出矫正余量 */
    top: -2.5%; left: -2.5%;
    width: 105%; height: 105%;
    object-fit: cover;
    display: block;
    will-change: transform;
    transition: transform 0.05s linear;
  }
  .viewfinder canvas {
    display: none;
  }

  /* 网格线 */
  .grid-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 33.33% 33.33%;
  }

  /* 预录制指示器 */
  .pre-record-indicator {
    position: absolute; top: calc(var(--safe-area-top) + 6px); left: 12px; z-index: 15;
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,149,0,0.18);
    border: 1px solid rgba(255,149,0,0.4);
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; color: #ff9500;
    opacity: 0; transition: opacity .3s;
  }
  .pre-record-indicator.active { opacity: 1; }
  .pre-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ff9500;
  }
  .pre-dot.pulse { animation: prePulse 1.2s infinite; }
  @keyframes prePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(1.6); }
  }

  /* 顶部录制提示条 */
  .record-bar {
    position: absolute; top: var(--safe-area-top); left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    opacity: 0; transform: translateY(-10px);
    transition: opacity .3s, transform .3s;
  }
  .record-bar.active { opacity: 1; transform: translateY(0); }
  .rec-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #ff3b30;
    flex-shrink: 0;
  }
  .rec-dot.blink { animation: blink 0.8s infinite alternate; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.15; } }
  .rec-time {
    font-family: 'SF Mono', 'Menlo', monospace;
    color: #fff; font-size: 16px; font-weight: 500;
    letter-spacing: 1px;
  }
  .rec-size {
    margin-left: auto;
    color: rgba(255,255,255,0.6); font-size: 12px;
  }

  /* 广角模式标签 */
  .lens-label {
    position: absolute; top: calc(var(--safe-area-top) + 56px); left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.6); color: #fff;
    padding: 5px 14px; border-radius: 16px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity .2s;
  }
  .lens-label.show { opacity: 1; }

  /* 语音命令提示 */
  .voice-hint {
    position: absolute; bottom: 155px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 8px 18px; border-radius: 20px;
    font-size: 13px; white-space: nowrap;
    transition: all .3s;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-hint.command-detected {
    background: rgba(52, 199, 89, 0.85);
  }

  /* 底部控制栏 - 固定在屏幕底部 */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 8px));
    background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
    flex-shrink: 0;
  }
  .controls-row {
    display: flex; align-items: center; justify-content: space-around;
    width: 100%; max-width: 400px;
    min-height: 52px;
  }
  .controls-features {
    display: flex; align-items: center; justify-content: center;
    gap: 20px;
    width: 100%;
    min-height: 40px;
    padding-top: 4px;
    padding-bottom: 4px;
  }

  .ctrl-group {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 56px;
  }

  .ctrl-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.2); }
  .ctrl-btn.wide-active {
    border-color: #ff9500;
    background: rgba(255,149,0,0.2);
  }
  .ctrl-btn.voice-active {
    border-color: #34c759;
  }
  .ctrl-btn.voice-off {
    border-color: rgba(255,255,255,0.15);
    opacity: 0.5;
  }
  .ctrl-btn.feature-on {
    border-color: #007aff;
    background: rgba(0,122,255,0.2);
    box-shadow: 0 0 12px rgba(0,122,255,0.3);
  }
  .ctrl-btn svg { width: 20px; height: 20px; }

  .ctrl-label {
    color: rgba(255,255,255,0.75); font-size: 10px;
    text-align: center;
  }
  .ctrl-label.on { color: #007aff; }

  /* 录制按钮 */
  .btn-rec-wrap { min-width: 70px; }
  .btn-rec {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .25s;
    position: relative;
  }
  .btn-rec:active { transform: scale(0.92); }
  .btn-rec.recording {
    border-color: #ff3b30;
    background: rgba(255,59,48,0.2);
  }
  .btn-rec.recording .rec-inner {
    width: 20px; height: 20px;
    border-radius: 5px;
    background: #ff3b30;
  }
  .rec-inner {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    transition: all .25s;
  }
  .btn-rec:active { transform: scale(0.92); }
  .btn-rec.recording {
    border-color: #ff3b30;
    background: rgba(255,59,48,0.2);
  }
  .btn-rec.recording .rec-inner {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: #ff3b30;
  }
  .rec-inner {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #fff;
    transition: all .25s;
  }

  /* 权限提示遮罩 */
  .permission-overlay {
    position: absolute; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    padding: 32px;
  }
  .permission-overlay h2 {
    color: #fff; font-size: 20px; font-weight: 600;
    text-align: center;
  }
  .permission-overlay p {
    color: rgba(255,255,255,0.6); font-size: 14px;
    text-align: center; line-height: 1.6;
  }
  .perm-btn {
    padding: 14px 40px;
    border-radius: 28px;
    background: #fff; color: #000;
    font-size: 16px; font-weight: 600;
    border: none; cursor: pointer;
    transition: all .2s;
  }
  .perm-btn:active { transform: scale(0.96); opacity: 0.85; }

  /* Toast */
  .toast {
    position: absolute; top: calc(var(--safe-area-top) + 60px);
    left: 50%; transform: translateX(-50%); z-index: 200;
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 10px 22px; border-radius: 20px;
    font-size: 14px;
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* === 小屏手机适配（高度 < 700px）=== */
  @media (max-height: 700px) {
    .controls {
      padding: 4px 16px calc(4px + var(--safe-area-bottom, 4px));
    }
    .controls-row { min-height: 44px; }
    .controls-features { min-height: 32px; padding-top: 2px; padding-bottom: 2px; gap: 16px; }
    .ctrl-btn { width: 34px; height: 34px; }
    .ctrl-btn svg { width: 17px; height: 17px; }
    .ctrl-label { font-size: 9px; }
    .btn-rec { width: 52px; height: 52px; }
    .rec-inner { width: 20px; height: 20px; }
    .btn-rec.recording .rec-inner { width: 16px; height: 16px; }
    .voice-hint { bottom: 130px; font-size: 11px; padding: 6px 14px; }
    .ctrl-group { min-width: 48px; gap: 3px; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="viewfinder" id="viewfinder">
    <div class="stabilizer" id="stabilizer">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="grid-overlay"></div>

    <!-- 预录制指示器 -->
    <div class="pre-record-indicator active" id="preRecordInd">
      <div class="pre-dot pulse"></div>
      <span>预录缓冲 10s</span>
    </div>

    <div class="record-bar" id="recordBar">
      <div class="rec-dot blink" id="recDot"></div>
      <span class="rec-time" id="recTime">00:00</span>
      <span class="rec-size" id="recSize"></span>
    </div>

    <div class="lens-label" id="lensLabel">0.5x 广角</div>

    <div class="voice-hint" id="voiceHint">🎤 说「开始录像」或「停止录像」</div>

    <div class="toast" id="toast"></div>
  </div>

  <div class="controls">
    <!-- 第一行：录制 + 广角 -->
    <div class="controls-row">
      <div class="ctrl-group">
        <div class="ctrl-btn wide-active" id="btnWide" title="切换广角/标准">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="5" width="20" height="14" rx="2" stroke="#fff"/>
            <circle cx="12" cy="12" r="4" stroke="#fff"/>
            <circle cx="18" cy="9" r="1" fill="#fff"/>
            <line x1="2" y1="8" x2="22" y2="8" stroke="#ff9500" stroke-width="1.5"/>
            <line x1="2" y1="16" x2="22" y2="16" stroke="#ff9500" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="ctrl-label">广角</span>
      </div>

      <div class="ctrl-group btn-rec-wrap">
        <div class="btn-rec" id="btnRecord">
          <div class="rec-inner"></div>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-btn voice-active" id="btnVoice" title="语音控制开关">
          <svg viewBox="0 0 24 24" fill="#fff">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </div>
        <span class="ctrl-label" id="voiceLabel">语音已开</span>
      </div>
    </div>

    <!-- 第二行：防抖 + 预录 -->
    <div class="controls-features">
      <div class="ctrl-group">
        <div class="ctrl-btn feature-on" id="btnStabilize" title="防抖开关">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="15" rx="2" stroke="#fff"/>
            <rect x="6" y="8" width="12" height="7" rx="1" stroke="#007aff" stroke-width="2"/>
            <circle cx="12" cy="11.5" r="1.5" fill="#007aff"/>
            <line x1="12" y1="4" x2="12" y2="1" stroke="#fff" stroke-width="1.5"/>
            <line x1="11" y1="1" x2="13" y2="1" stroke="#007aff" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="ctrl-label on" id="stabLabel">防抖已开</span>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-btn feature-on" id="btnPreRecord" title="预录缓冲">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10" stroke="#fff"/>
            <polyline points="8,6 8,18 18,12" fill="#ff9500" stroke="#ff9500" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke="#ff9500" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="12" r="1" fill="#ff9500"/>
          </svg>
        </div>
        <span class="ctrl-label on" id="preLabel">预录已开</span>
      </div>
    </div>
  </div>

  <div class="permission-overlay" id="permOverlay">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <circle cx="8" cy="9" r="2"/>
      <circle cx="16" cy="9" r="2"/>
      <path d="M2 15l4-4 2 2 4-4 4 4 2-2 4 4"/>
    </svg>
    <h2>需要相机与麦克风权限</h2>
    <p>语音控制录像需要相机和麦克风授权<br>点击下方按钮开始</p>
    <button class="perm-btn" id="btnPerm">开启相机</button>
  </div>

</div>

<script>
(function() {
  'use strict';

  // === DOM 引用 ===
  const $ = id => document.getElementById(id);
  const video = $('video');
  const stabilizer = $('stabilizer');
  const recordBar = $('recordBar');
  const recTime = $('recTime');
  const recSize = $('recSize');
  const lensLabel = $('lensLabel');
  const voiceHint = $('voiceHint');
  const toast = $('toast');
  const btnRecord = $('btnRecord');
  const btnWide = $('btnWide');
  const btnVoice = $('btnVoice');
  const btnStabilize = $('btnStabilize');
  const btnPreRecord = $('btnPreRecord');
  const voiceLabel = $('voiceLabel');
  const stabLabel = $('stabLabel');
  const preLabel = $('preLabel');
  const permOverlay = $('permOverlay');
  const btnPerm = $('btnPerm');
  const preRecordInd = $('preRecordInd');

  // === 状态 ===
  let stream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;
  let recordingSeconds = 0;
  let timerInterval = null;
  let voiceEnabled = true;
  let isWideAngle = true;
  let stabilizeEnabled = true;
  let preRecordEnabled = true;
  let recognition = null;
  let cameraDevices = [];
  let currentCameraIndex = 0;

  // ============ 防抖 ============
  let stabilizerAnimFrame = null;
  let motionData = { x: 0, y: 0, rotate: 0 };
  let targetMotion = { x: 0, y: 0, rotate: 0 };
  const SMOOTH_FACTOR = 0.15; // 低通平滑系数
  const MOTION_SCALE = 0.6;    // 运动补偿强度
  const MAX_TRANSLATE = 18;    // 最大像素平移
  const MAX_ROTATE = 1.2;      // 最大旋转角度

  function setupStabilization() {
    let lastRotRate = { alpha: 0, beta: 0, gamma: 0 };
    let lastAccel = { x: 0, y: 0, z: 0 };

    // 陀螺仪：旋转速率
    window.addEventListener('deviceorientation', (e) => {
      if (!stabilizeEnabled) return;
      const a = e.alpha || 0, b = e.beta || 0, g = e.gamma || 0;
      const dAlpha = a - lastRotRate.alpha;
      const dBeta = b - lastRotRate.beta;
      const dGamma = g - lastRotRate.gamma;
      lastRotRate = { alpha: a, beta: b, gamma: g };

      // 手机俯仰和偏航补偿
      targetMotion.rotate = clamp(dGamma * 0.08, -MAX_ROTATE, MAX_ROTATE);
      targetMotion.x = clamp(dBeta * MOTION_SCALE, -MAX_TRANSLATE, MAX_TRANSLATE);
    }, true);

    // 加速度计：线性抖动补偿
    window.addEventListener('devicemotion', (e) => {
      if (!stabilizeEnabled) return;
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const dx = (acc.x - lastAccel.x);
      const dy = (acc.y - lastAccel.y);
      lastAccel = { x: acc.x, y: acc.y, z: acc.z || 0 };

      // 累积高频短时抖动
      targetMotion.y += clamp(dy * 1.5, -4, 4);
      targetMotion.x += clamp(dx * 1.5, -4, 4);
      targetMotion.x = clamp(targetMotion.x, -MAX_TRANSLATE, MAX_TRANSLATE);
      targetMotion.y = clamp(targetMotion.y, -MAX_TRANSLATE, MAX_TRANSLATE);
    }, true);

    // RAF 循环：平滑插值 + 应用到 video
    function updateStabilizer() {
      // 低通平滑
      motionData.x += (targetMotion.x - motionData.x) * SMOOTH_FACTOR;
      motionData.y += (targetMotion.y - motionData.y) * SMOOTH_FACTOR;
      motionData.rotate += (targetMotion.rotate - motionData.rotate) * SMOOTH_FACTOR;

      // 缓慢归零（静止时回到中心）
      targetMotion.x *= 0.95;
      targetMotion.y *= 0.95;
      targetMotion.rotate *= 0.95;

      if (stabilizeEnabled) {
        video.style.transform =
          'translate(' + (-motionData.x).toFixed(2) + 'px, ' + (-motionData.y).toFixed(2) + 'px) ' +
          'rotate(' + (-motionData.rotate).toFixed(3) + 'deg)';
      }

      stabilizerAnimFrame = requestAnimationFrame(updateStabilizer);
    }
    stabilizerAnimFrame = requestAnimationFrame(updateStabilizer);
  }

  function stopStabilization() {
    if (stabilizerAnimFrame) {
      cancelAnimationFrame(stabilizerAnimFrame);
      stabilizerAnimFrame = null;
    }
    video.style.transform = '';
    motionData = { x: 0, y: 0, rotate: 0 };
    targetMotion = { x: 0, y: 0, rotate: 0 };
  }

  // ============ 预录制 ============
  const PRE_RECORD_MS = 10000;      // 预录 10 秒
  const PRE_TIMESLICE = 500;         // 每 500ms 切一片
  let preRecorder = null;
  let preRecordBuffer = [];           // 环形缓冲 [{ ts, chunk }]
  let preRecordTimerInterval = null;

  function startPreRecording() {
    if (!preRecordEnabled || !stream) return;
    stopPreRecordingSilent();

    try {
      let mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
      }
      preRecorder = new MediaRecorder(stream, {
        mimeType,
        videoBitsPerSecond: 4000000
      });

      preRecordBuffer = [];

      preRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          preRecordBuffer.push({ ts: Date.now(), chunk: e.data });
          // 清理超出缓冲窗口的旧数据
          const cutoff = Date.now() - PRE_RECORD_MS - 500;
          while (preRecordBuffer.length > 1 && preRecordBuffer[0].ts < cutoff) {
            preRecordBuffer.shift();
          }
          // 限制最多 20 片防止内存爆
          if (preRecordBuffer.length > 20) preRecordBuffer.shift();
        }
      };

      preRecorder.onerror = (e) => {
        console.warn('预录错误:', e);
      };

      preRecorder.start(PRE_TIMESLICE);
      preRecordInd.classList.add('active');
      console.log('预录制缓冲已启动');
    } catch(e) {
      console.warn('启动预录失败:', e);
    }
  }

  function stopPreRecordingSilent() {
    if (preRecorder && preRecorder.state === 'recording') {
      try { preRecorder.stop(); } catch(e) {}
    }
    preRecorder = null;
  }

  function stopPreRecording() {
    stopPreRecordingSilent();
    preRecordBuffer = [];
    preRecordInd.classList.remove('active');
  }

  // 获取预录缓冲的 chunk 数组（在开始正式录制时快照）
  function snapshotPreBuffer() {
    const now = Date.now();
    const cutoff = now - PRE_RECORD_MS;
    const chunks = preRecordBuffer
      .filter(item => item.ts >= cutoff)
      .map(item => item.chunk);
    return chunks;
  }

  // ============ Toast ============
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ============ 工具函数 ============
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  // ============ 相机设备枚举 ============
  async function enumerateCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      cameraDevices = devices.filter(d => d.kind === 'videoinput');
      console.log('摄像头列表:', cameraDevices.map(d => d.label || d.deviceId));
      return cameraDevices;
    } catch(e) {
      console.warn('枚举设备失败:', e);
      return [];
    }
  }

  // ============ 启动相机 ============
  async function startCamera(deviceId = null) {
    stopCamera();

    const constraints = {
      video: {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        facingMode: 'environment'
      },
      audio: true
    };

    // 防抖：尝试请求硬件 EIS
    if (stabilizeEnabled) {
      constraints.video.videoStabilizationMode = 'auto';
    }

    if (deviceId) {
      constraints.video.deviceId = { exact: deviceId };
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      permOverlay.style.display = 'none';

      // 相机启动后自动开启预录
      setTimeout(() => {
        if (preRecordEnabled) startPreRecording();
      }, 300);

      console.log('相机已启动:', deviceId || '默认后置',
        stabilizeEnabled ? '(EIS on)' : '');
    } catch(e) {
      // 如果 videoStabilizationMode 不支持，回退
      if (e.name === 'OverconstrainedError' && constraints.video.videoStabilizationMode) {
        delete constraints.video.videoStabilizationMode;
        try {
          stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          permOverlay.style.display = 'none';
          console.log('相机已启动（EIS 不支持，软件防抖生效）');
          setTimeout(() => {
            if (preRecordEnabled) startPreRecording();
          }, 300);
          return;
        } catch(e2) {
          console.error('相机回退也失败:', e2);
        }
      }
      console.error('启动相机失败:', e);
      if (!deviceId) {
        showToast('无法访问相机，请检查权限');
      }
      throw e;
    }
  }

  function stopCamera() {
    stopPreRecordingSilent();
    preRecordBuffer = [];
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.srcObject = null;
  }

  // ============ 广角切换 ============
  async function toggleWideAngle() {
    if (isRecording) {
      showToast('录制中无法切换镜头');
      return;
    }

    isWideAngle = !isWideAngle;

    if (cameraDevices.length <= 1) {
      await startCamera();
      showToast(isWideAngle ? '广角模式（模拟）' : '标准模式');
    } else {
      currentCameraIndex = isWideAngle ? 0 : Math.min(1, cameraDevices.length - 1);
      try {
        await startCamera(cameraDevices[currentCameraIndex].deviceId);
        showToast(isWideAngle ? '📷 广角模式' : '📷 标准模式');
      } catch(e) {
        await startCamera();
        showToast(isWideAngle ? '广角模式（回退）' : '标准模式（回退）');
      }
    }

    updateUIState();
  }

  function updateUIState() {
    if (isWideAngle) {
      btnWide.classList.add('wide-active');
      lensLabel.textContent = '0.5x 广角';
      lensLabel.classList.add('show');
      setTimeout(() => lensLabel.classList.remove('show'), 2000);
    } else {
      btnWide.classList.remove('wide-active');
      lensLabel.textContent = '1x';
      lensLabel.classList.add('show');
      setTimeout(() => lensLabel.classList.remove('show'), 2000);
    }
  }

  // ============ 录像（含预录） ============
  let savedPreChunks = []; // 保存的预录数据

  function startRecording() {
    if (isRecording || !stream) return;
    isRecording = true;
    recordedChunks = [];
    recordingSeconds = 0;

    // --- 关键：快照预录缓冲 ---
    savedPreChunks = [];
    if (preRecordEnabled) {
      savedPreChunks = snapshotPreBuffer();
      preRecordInd.classList.remove('active');
      console.log('预录快照:', savedPreChunks.length, '片');
    }

    // 重启预录（为了下次录制也有缓冲）
    stopPreRecordingSilent();
    preRecordBuffer = [];

    try {
      let mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'video/webm';
        }
      }

      mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        // 合并：预录缓冲 + 正式录制
        const allChunks = [...savedPreChunks, ...recordedChunks];
        savedPreChunks = [];

        if (allChunks.length === 0) return;

        const blob = new Blob(allChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        const preLen = savedPreChunks.length; // 已用，这是 0
        // 重新计算：实际预录的 chunk 数
        downloadOrShare(url, blob);
        recordedChunks = [];

        // 录制结束后重启预录
        if (preRecordEnabled && stream) {
          setTimeout(() => startPreRecording(), 500);
        }
      };

      mediaRecorder.onerror = (e) => {
        console.error('录制错误:', e);
        showToast('录制出错，请重试');
        savedPreChunks = [];
        resetRecordingState();
        if (preRecordEnabled && stream) startPreRecording();
      };

      mediaRecorder.start(1000);
    } catch(e) {
      console.error('开始录制失败:', e);
      isRecording = false;
      savedPreChunks = [];
      showToast('录制启动失败');
      if (preRecordEnabled && stream) startPreRecording();
      return;
    }

    btnRecord.classList.add('recording');
    recordBar.classList.add('active');
    startTimer();
    voiceHint.textContent = '🔴 正在录像...';
    voiceHint.classList.add('command-detected');
    const preInfo = savedPreChunks.length > 0 ? '（含预录 ' + (PRE_RECORD_MS/1000) + 's）' : '';
    showToast('🔴 录像开始' + preInfo);
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;

    if (mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }

    resetRecordingState();
    voiceHint.textContent = '🎤 说「开始录像」或「停止录像」';
    voiceHint.classList.remove('command-detected');
    showToast('⏹️ 录像已保存');
  }

  function resetRecordingState() {
    btnRecord.classList.remove('recording');
    recordBar.classList.remove('active');
    stopTimer();
  }

  function downloadOrShare(url, blob) {
    const now = new Date();
    const filename = 'VoiceCamera_' +
      now.getFullYear() +
      String(now.getMonth()+1).padStart(2,'0') +
      String(now.getDate()).padStart(2,'0') + '_' +
      String(now.getHours()).padStart(2,'0') +
      String(now.getMinutes()).padStart(2,'0') +
      String(now.getSeconds()).padStart(2,'0') + '.webm';

    if (navigator.share && navigator.canShare) {
      const file = new File([blob], filename, { type: blob.type || 'video/webm' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({
          title: '语音相机录像',
          files: [file]
        }).catch(() => fallbackDownload(url, filename));
        return;
      }
    }
    fallbackDownload(url, filename);
  }

  function fallbackDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 200);
    showToast('✅ 视频已保存: ' + filename);
  }

  // ============ 计时器 ============
  function startTimer() {
    recTime.textContent = '00:00';
    timerInterval = setInterval(() => {
      recordingSeconds++;
      const m = Math.floor(recordingSeconds / 60);
      const s = recordingSeconds % 60;
      recTime.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      recSize.textContent = formatSize(recordingSeconds * 500000);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function formatSize(bytes) {
    if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + 'KB';
    return (bytes/(1024*1024)).toFixed(1) + 'MB';
  }

  // ============ 语音控制 ============
  function setupVoiceControl() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      voiceEnabled = false;
      btnVoice.classList.add('voice-off');
      voiceLabel.textContent = '语音不可用';
      voiceHint.textContent = '📱 手动点击按钮操作';
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 3;

    const startKeywords = ['开始录像', '开始拍摄', '开始录影', '开始', '录像', '拍摄', '录影'];
    const stopKeywords  = ['停止录像', '停止拍摄', '停止录影', '停止', '结束', '停'];

    recognition.onresult = (event) => {
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          for (let j = 0; j < event.results[i].length; j++) {
            const alt = event.results[i][j].transcript.toLowerCase();
            const isStop = stopKeywords.some(k => alt.includes(k.toLowerCase()));
            const isStart = startKeywords.some(k => alt.includes(k.toLowerCase()));

            if (isStop && isRecording) {
              voiceHint.textContent = '✅ 识别：停止录像';
              voiceHint.classList.add('command-detected');
              setTimeout(() => voiceHint.classList.remove('command-detected'), 1000);
              stopRecording();
              return;
            }
            if (isStart && !isRecording) {
              voiceHint.textContent = '✅ 识别：开始录像';
              voiceHint.classList.add('command-detected');
              setTimeout(() => voiceHint.classList.remove('command-detected'), 1000);
              startRecording();
              return;
            }
          }
        }
      }
      if (!isRecording) voiceHint.textContent = '🎤 语音监听中...';
    };

    recognition.onerror = (event) => {
      console.warn('语音识别错误:', event.error);
      if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
        voiceHint.textContent = '🔇 语音服务不可用';
        return;
      }
      if (voiceEnabled) {
        setTimeout(() => { try { recognition.start(); } catch(e) {} }, 2000);
      }
    };

    recognition.onend = () => {
      if (voiceEnabled) {
        setTimeout(() => { try { recognition.start(); } catch(e) {} }, 500);
      }
    };

    try { recognition.start(); } catch(e) {}
  }

  // ============ 功能开关 ============
  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    if (voiceEnabled) {
      btnVoice.classList.remove('voice-off');
      btnVoice.classList.add('voice-active');
      voiceLabel.textContent = '语音已开';
      voiceHint.textContent = '🎤 说「开始录像」或「停止录像」';
      try { recognition.start(); } catch(e) {}
    } else {
      btnVoice.classList.add('voice-off');
      btnVoice.classList.remove('voice-active');
      voiceLabel.textContent = '语音已关';
      voiceHint.textContent = '📱 手动点击按钮操作';
      try { recognition.stop(); } catch(e) {}
    }
  }

  function toggleStabilize() {
    stabilizeEnabled = !stabilizeEnabled;
    if (stabilizeEnabled) {
      btnStabilize.classList.add('feature-on');
      stabLabel.textContent = '防抖已开';
      stabLabel.classList.add('on');
      setupStabilization();
      showToast('🛡️ 防抖已开启');
    } else {
      btnStabilize.classList.remove('feature-on');
      stabLabel.textContent = '防抖已关';
      stabLabel.classList.remove('on');
      stopStabilization();
      showToast('防抖已关闭');
    }
  }

  function togglePreRecord() {
    preRecordEnabled = !preRecordEnabled;
    if (preRecordEnabled) {
      btnPreRecord.classList.add('feature-on');
      preLabel.textContent = '预录已开';
      preLabel.classList.add('on');
      if (stream && !isRecording) startPreRecording();
      showToast('⏪ 预录缓冲 ' + (PRE_RECORD_MS/1000) + 's');
    } else {
      btnPreRecord.classList.remove('feature-on');
      preLabel.textContent = '预录已关';
      preLabel.classList.remove('on');
      stopPreRecording();
      showToast('预录已关闭');
    }
  }

  // ============ 事件绑定 ============
  btnPerm.addEventListener('click', async () => {
    try {
      await enumerateCameras();
      await startCamera();
      if (voiceEnabled) setupVoiceControl();
      if (stabilizeEnabled) setupStabilization();
      updateUIState();
    } catch(e) {
      showToast('请允许相机和麦克风权限');
    }
  });

  btnRecord.addEventListener('click', () => {
    if (isRecording) stopRecording();
    else startRecording();
  });

  btnWide.addEventListener('click', toggleWideAngle);
  btnVoice.addEventListener('click', toggleVoice);
  btnStabilize.addEventListener('click', toggleStabilize);
  btnPreRecord.addEventListener('click', togglePreRecord);

  // 双击取景器切换镜头
  let lastTap = 0;
  document.querySelector('.viewfinder').addEventListener('click', (e) => {
    if (e.target.closest('button') || e.target.closest('.voice-hint') || e.target.closest('.toast')) return;
    const now = Date.now();
    if (now - lastTap < 300) toggleWideAngle();
    lastTap = now;
  });

  // 页面恢复时重连
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && stream && !video.srcObject) {
      video.srcObject = stream;
      if (preRecordEnabled && !isRecording) startPreRecording();
    }
  });

  // Service Worker - 强制更新
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // 检测到新版本时自动刷新
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
            // 清除旧缓存，强制刷新页面
            caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
              .then(() => { location.reload(); });
          }
        });
      });
    }).catch(() => {});
    // 每次加载时主动检查更新
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg) reg.update();
    });
  }
})();
</script>
</body>
