<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码安装语音相机</title>
<style>
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a1e;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    padding: 24px;
  }
  .card {
    background: #1a1a3e;
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p { color: #aac; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
  .qr-wrap {
    background: #fff; border-radius: 16px;
    padding: 16px; display: inline-block;
    margin-bottom: 16px;
  }
  .qr-wrap svg { display: block; }
  .url {
    background: #0d0d26; border-radius: 10px;
    padding: 12px 16px; font-size: 15px;
    color: #88f;
    word-break: break-all; font-family: monospace;
    margin-bottom: 20px;
  }
  .steps {
    text-align: left; background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 16px 20px;
    font-size: 13px; line-height: 2;
  }
  .steps span { color: #88f; font-weight: bold; }
</style>
</head>
<body>
  <div class="card">
    <h1>语音相机APP</h1>
    <p>手机扫二维码打开 → 添加到主屏幕即可安装</p>
    <div class="qr-wrap" id="qr"></div>
    <div class="url" id="urlDisplay"></div>
    <div class="steps">
      <span>1.</span> 手机和电脑连接同一WiFi<br>
      <span>2.</span> 用手机相机或浏览器扫上方二维码<br>
      <span>3.</span> 打开后点击「添加到主屏幕」<br>
      <span>4.</span> 主屏幕出现图标即安装成功
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    var url = location.hostname + ':8080';
    document.getElementById('urlDisplay').textContent = 'http://' + url;
    var qr = document.getElementById('qr');
    new QRCode(qr, { text: 'http://'+url, width: 200, height: 200, colorDark:'#000', colorLight:'#fff' });
  </script>
</body>
</html>
